<!-- Forms and Input & Output tags -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms and input & output tags - let's learn it</title>
</head>

<body>
      <form action="post">
    <div>
        <label for="username">Enter Your username:</label>
        <input type ="text" id="username" name="username" placeholder="Enter your name">
    </div>
    <div>
        <label for = "male">Male</label>
        <input type="radio" id = "male"  name ="Gender" value = "male">
        <label for = "female">Female</label>
        <input type="radio" id = "Female"  name ="Gender" value = "female">
    </div>
    <div>
        <input type ="checkbox" id="check" name ="subscribe" value = "yes">
        <label for = "check">Check box</label>
    </div>
    <div>
        <label for="comment">Enter Your Comment</label>
        <br>
        <textarea name =   "comment" rows="10" cols ="10"></textarea>
    </div>
      </form>
</body>

</html>
